<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilli Beans Park Shopping Canoas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #1a1a1a; color: white; }
        header { background: #e31b24; color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .nav-buttons { display: flex; justify-content: center; gap: 15px; margin: 25px; }
        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            border: 2px solid #e31b24; 
            background: transparent; 
            color: white; 
            border-radius: 30px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #e31b24; transform: scale(1.05); }
        .content { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        iframe { 
            width: 95%; 
            height: 70vh; 
            border: none; 
            border-radius: 15px; 
            background: white; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
        }
        footer { margin-top: 20px; text-align: center; font-size: 12px; color: #888; padding-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <h1>CHILLI BEANS PARK SHOPPING CANOAS</h1>
</header>

<div class="nav-buttons">
    <button onclick="mudarPlanilha('LINK_DA_PLANILHA_PRINCIPAIS')">HISTÓRICO PRINCIPAIS</button>
    <button onclick="mudarPlanilha('LINK_DA_PLANILHA_ACESSORIOS')">HISTÓRICO ACESSÓRIOS</button>
</div>

<div class="content">
    <iframe id="painel" src="LINK_DA_PLANILHA_PRINCIPAIS"></iframe>
</div>

<footer>
    Portal de Inventário em Tempo Real
</footer>

<script>
    function mudarPlanilha(url) {
        document.getElementById('painel').src = url;
    }
</script>

</body>
</html>
